name: ${COMPOSE_PROJECT_NAME:-listaatendimento}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app

  api:
    image: ${COMPOSE_PROJECT_NAME:-listaatendimento}-api:latest
    build:
      context: ./back
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-lista-da-vez-api}
      APP_ENV: production
      APP_ADDR: :8080
      WEB_APP_URL: ${WEB_APP_URL}
      UPLOADS_DIR: /app/data/uploads
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      DATABASE_MIN_CONNS: ${DATABASE_MIN_CONNS:-0}
      DATABASE_MAX_CONNS: ${DATABASE_MAX_CONNS:-10}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      AUTH_TOKEN_TTL: ${AUTH_TOKEN_TTL:-12h}
      AUTH_INVITE_TTL: ${AUTH_INVITE_TTL:-168h}
      AUTH_PASSWORD_RESET_TTL: ${AUTH_PASSWORD_RESET_TTL:-30m}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Lista da Vez}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-starttls}
      SMTP_INSECURE_SKIP_VERIFY: ${SMTP_INSECURE_SKIP_VERIFY:-false}
      SMTP_TIMEOUT: ${SMTP_TIMEOUT:-10s}
      AUTH_BCRYPT_COST: ${AUTH_BCRYPT_COST:-10}
      AUTH_CONSULTANT_EMAIL_DOMAIN: ${AUTH_CONSULTANT_EMAIL_DOMAIN}
      AUTH_CONSULTANT_DEFAULT_PASSWORD: ${AUTH_CONSULTANT_DEFAULT_PASSWORD}
      ERP_SOURCE_DIR: ${ERP_SOURCE_DIR:-/app/data/erp/source}
      ERP_STORAGE_DIR: ${ERP_STORAGE_DIR:-/app/data/erp/storage}
      ERP_BOOTSTRAP_ITEM_FILE: ${ERP_BOOTSTRAP_ITEM_FILE:-consolidados/184/item_184_consolidado.md}
      ERP_BOOTSTRAP_CUSTOMER_FILE: ${ERP_BOOTSTRAP_CUSTOMER_FILE:-consolidados/184/customer_184_consolidado.md}
      ERP_BOOTSTRAP_EMPLOYEE_FILE: ${ERP_BOOTSTRAP_EMPLOYEE_FILE:-consolidados/184/employee_184_consolidado.md}
      ERP_BOOTSTRAP_ORDER_FILE: ${ERP_BOOTSTRAP_ORDER_FILE:-consolidados/184/order_184_consolidado.md}
      ERP_BOOTSTRAP_ORDER_CANCELED_FILE: ${ERP_BOOTSTRAP_ORDER_CANCELED_FILE:-consolidados/184/ordercanceled_184_consolidado.md}
      ERP_BOOTSTRAP_TENANT_ID: ${ERP_BOOTSTRAP_TENANT_ID:-}
      ERP_BOOTSTRAP_TENANT_SLUG: ${ERP_BOOTSTRAP_TENANT_SLUG:-}
      ERP_BOOTSTRAP_STORE_CODE: ${ERP_BOOTSTRAP_STORE_CODE:-184}
      ERP_BOOTSTRAP_STORE_NAME: ${ERP_BOOTSTRAP_STORE_NAME:-Loja 184}
      ERP_BOOTSTRAP_STORE_CITY: ${ERP_BOOTSTRAP_STORE_CITY:-}
      ERP_ALLOW_MANUAL_SYNC: ${ERP_ALLOW_MANUAL_SYNC:-false}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_PORT:-18080}:8080"
    volumes:
      - api_uploads:/app/data/uploads
      - ${ERP_SOURCE_HOST_DIR:-./erp-source}:/app/data/erp/source:ro
      - api_erp_storage:/app/data/erp/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent http://127.0.0.1:8080/healthz > /dev/null || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      app:
      proxy:
        aliases:
          - ${PROXY_API_ALIAS:-lista-api}

  web:
    image: ${COMPOSE_PROJECT_NAME:-listaatendimento}-web:latest
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_PUBLIC_API_WS_BASE: ${NUXT_PUBLIC_API_WS_BASE:-}
      NUXT_API_INTERNAL_BASE: ${NUXT_API_INTERNAL_BASE:-http://api:8080}
      NITRO_HOST: 0.0.0.0
      PORT: 3003
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-13003}:3003"
    networks:
      app:
      proxy:
        aliases:
          - ${PROXY_WEB_ALIAS:-lista-web}

volumes:
  postgres_data:
  api_uploads:
  api_erp_storage:

networks:
  app:
  proxy:
    external: true
    name: ${PROXY_NETWORK_NAME:-omnichannel-mvp_default}
